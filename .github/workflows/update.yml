name: Update Aki.m3u

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run updater
        run: |
          python << 'EOF'
          import requests

          local_file = "Aki.m3u"
          source_url = "https://raw.githubusercontent.com/alex4528y/m3u/refs/heads/main/jtv.m3u"
          start_line = 1027

          # Read local file
          with open(local_file, "r", encoding="utf-8") as f:
              local_lines = f.readlines()

          # Keep first 1026 lines
          keep_lines = local_lines[:start_line - 1]

          # Fetch remote content
          response = requests.get(source_url)
          response.raise_for_status()

          remote_content = response.text.splitlines(keepends=True)

          # Write updated file
          with open(local_file, "w", encoding="utf-8") as f:
              f.writelines(keep_lines)
              f.writelines(remote_content)

          print("Aki.m3u updated successfully")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add Aki.m3u

          git diff --cached --quiet || git commit -m "Auto update Aki.m3u"

          git push
